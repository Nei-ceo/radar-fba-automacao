name: Mineracao Automatica Amazon

on:
  workflow_dispatch:
  schedule:
    - cron: '0 08 * * *'

jobs:
  mineracao:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar Playwright e Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          
      - name: Executar Robo
        run: python robo.py

      - name: Salvar Dados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dados_fba.json
          git commit -m "Update dados" || exit 0
          git push
