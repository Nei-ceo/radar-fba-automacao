name: Mineracao Manual Amazon

on:
  workflow_dispatch: 

jobs:
  mineracao:
    runs-on: ubuntu-latest
    # Adicionamos isso para reforçar a permissão de escrita via código
    permissions:
      contents: write
      
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4 # Atualizado v3 -> v4

      - name: Configurar Python
        uses: actions/setup-python@v5 # Atualizado v4 -> v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Executar Robo
        run: python robo.py

      - name: Salvar resultados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dados_fba.json
          git commit -m "Execução manual: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
